name: Deploy Master App to GitHub Pages

on:
  # Jab bhi 'main' branch me koi change hoga, ye auto-run karega
  push:
    branches: ["main"] 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: Upload App Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy App to Live URL
        id: deployment
        uses: actions/deploy-pages@v4
